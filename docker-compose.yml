version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: letstrip-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-letstrip}
      POSTGRES_USER: ${POSTGRES_USER:-letstrip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-letstrip_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-letstrip} -d ${POSTGRES_DB:-letstrip}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - letstrip-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: letstrip-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-letstrip}:${POSTGRES_PASSWORD:-letstrip_secret}@db:5432/${POSTGRES_DB:-letstrip}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production_12345}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - letstrip-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: letstrip-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - letstrip-net

  nginx:
    image: nginx:alpine
    container_name: letstrip-nginx
    restart: unless-stopped
    ports:
      - "8500:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/uploads:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - letstrip-net

volumes:
  postgres_data:
  uploads_data:

networks:
  letstrip-net:
    driver: bridge
